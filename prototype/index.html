<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>作战导航 · 原型</title>
<link rel="stylesheet" href="css/styles.css">
<style>
  body { background: #fff; }
  .page { max-width: 900px; margin: 0 auto; padding: 40px 24px; }

  /* Header */
  .header { text-align: center; margin-bottom: 36px; }
  .header .tag { display:inline-block;padding:4px 12px;border-radius:var(--r-full);background:var(--purple-subtle);color:var(--purple);font-size:11px;font-weight:600;letter-spacing:0.04em;margin-bottom:12px; }
  .header h1 { font-family:var(--font-display);font-size:32px;font-weight:700;letter-spacing:-0.5px;margin-bottom:6px; }
  .header h1 em { color:var(--purple);font-style:normal; }
  .header .sub { color:var(--text-muted);font-size:14px; }

  /* Entry links */
  .entry { max-width: 520px; margin: 0 auto 36px; }
  .role-tabs { display:flex;gap:4px;justify-content:center;margin-bottom:20px; }
  .rtab { padding:7px 18px;border-radius:var(--r-xl);border:1px solid var(--border-light);background:#fff;color:var(--text-secondary);font-size:13px;font-weight:500;cursor:pointer;transition:all 0.15s; }
  .rtab.on { background:var(--purple);color:#fff;border-color:var(--purple); }
  .links { display:grid;grid-template-columns:1fr 1fr;gap:14px; }
  .link { display:flex;flex-direction:column;align-items:center;gap:8px;padding:22px 16px;border-radius:var(--r-2xl);text-decoration:none;background:#fff;border:1px solid var(--border-light);box-shadow:var(--shadow-card);transition:all 0.2s;color:var(--text); }
  .link:hover { box-shadow:var(--shadow-hover);transform:translateY(-2px); }
  .link.pc:hover { border-color:var(--purple); }
  .link.mb:hover { border-color:var(--success); }
  .link .li { font-size:32px; }
  .link .ll { font-family:var(--font-display);font-size:15px;font-weight:700; }
  .link .ld { font-size:11px;color:var(--text-muted);text-align:center; }

  /* Doc links */
  .intro { margin-bottom: 40px; }
  .doc-links { display:grid;grid-template-columns:1fr 1fr;gap:14px;max-width:520px;margin:0 auto; }
  .doc-link {
    display:flex;flex-direction:column;align-items:center;gap:8px;
    padding:24px 16px;border-radius:var(--r-2xl);text-decoration:none;
    background:#fff;border:1px solid var(--border-light);
    box-shadow:var(--shadow-card);transition:all 0.2s;color:var(--text);
  }
  .doc-link:hover { box-shadow:var(--shadow-hover);transform:translateY(-2px);border-color:var(--purple); }
  .doc-link .doc-icon { font-size:28px; }
  .doc-link .doc-title { font-family:var(--font-display);font-size:15px;font-weight:700; }
  .doc-link .doc-desc { font-size:11px;color:var(--text-muted);text-align:center;line-height:1.5; }

  .footer { text-align:center;padding:20px;font-size:11px;color:var(--text-muted);font-family:var(--font-mono);border-top:1px solid var(--border-light); }
</style>
</head>
<body>
<div class="page">

  <!-- ═══════ HEADER ═══════ -->
  <div class="header">
    <div class="tag">PROTOTYPE v1.0</div>
    <h1><em>🎯</em> 作战导航</h1>
    <p class="sub">销售智能体 · 超级助理核心功能 · 战术指挥舱</p>
  </div>

  <!-- ═══════ ENTRY ═══════ -->
  <div class="entry">
    <div class="role-tabs">
      <button class="rtab on" data-r="ar">AR Sales</button>
      <button class="rtab" data-r="gm">战区总经理</button>
    </div>
    <div class="links">
      <a class="link pc" id="pclink" href="pc.html?role=ar"><div class="li">🖥️</div><div class="ll">PC 指挥舱</div><div class="ld">6信息模块 · 多面板态势一览</div></a>
      <a class="link mb" id="mblink" href="mobile.html?role=ar"><div class="li">📱</div><div class="ll">Mobile 对话流</div><div class="ld">Agent 推送 · 教练闭环</div></a>
    </div>
  </div>

  <!-- ═══════ 文档链接 ═══════ -->
  <div class="intro">
    <div class="doc-links">
      <a class="doc-link" href="scenarios.html">
        <div class="doc-icon">📋</div>
        <div class="doc-title">Demo 场景覆盖</div>
        <div class="doc-desc">4 个核心作战场景 · 完整操作步骤 · Agent 调用链路</div>
      </a>
      <a class="doc-link" href="architecture.html">
        <div class="doc-icon">🏗️</div>
        <div class="doc-title">产品能力架构</div>
        <div class="doc-desc">1+N Agent 架构 · Skill 清单 · 作战导航功能定位</div>
      </a>
    </div>
  </div>

  <div class="footer">Kraken Design System · 6 信息模块 · 3 层地图钻取 · 教练Agent 闭环</div>
</div>

<script>
var role='ar';
document.querySelectorAll('.rtab').forEach(function(b){
  b.addEventListener('click',function(){
    role=this.dataset.r;
    document.querySelectorAll('.rtab').forEach(function(x){x.classList.toggle('on',x.dataset.r===role);});
    document.getElementById('pclink').href='pc.html?role='+role;
    document.getElementById('mblink').href='mobile.html?role='+role;
  });
});
</script>
</body>
</html>
