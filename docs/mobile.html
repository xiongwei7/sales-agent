<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>作战导航 · Mobile</title>
<link rel="stylesheet" href="css/styles.css">
<style>
  .sh { width:100%; max-width:430px; height:100vh; display:flex; flex-direction:column; background:#fff; margin:0 auto; overflow:hidden; position:relative; }

  /* Header */
  .mh {
    display:flex; align-items:center; gap:10px; padding:10px 14px;
    background:#fff; border-bottom:1px solid var(--border); box-shadow:var(--shadow-sm);
    z-index:10; flex-shrink:0;
  }
  .mh .av { width:34px; height:34px; border-radius:50%; background:var(--purple); display:flex; align-items:center; justify-content:center; font-size:18px; flex-shrink:0; }
  .mh .info { flex:1; }
  .mh .name { font-family:var(--font-display); font-size:14px; font-weight:700; }
  .mh .sub { font-size:9px; color:var(--text-muted); }
  .mh .rt {
    padding:5px 10px; border-radius:var(--r-xl); border:1px solid var(--border-light);
    background:#fff; color:var(--text-secondary); font-size:10px; cursor:pointer;
  }

  /* Chat */
  .chat { flex:1; overflow-y:auto; padding:12px; display:flex; flex-direction:column; gap:10px; padding-bottom:110px; background:var(--bg); }

  .msg { display:flex; gap:8px; animation:fadeUp 0.3s ease-out; }
  .msg-a { align-items:flex-start; max-width:92%; }
  .msg-u { justify-content:flex-end; }
  .msg .mav { width:26px; height:26px; border-radius:50%; background:var(--purple); display:flex; align-items:center; justify-content:center; font-size:14px; flex-shrink:0; color:#fff; }
  .bub { padding:10px 13px; font-size:13px; line-height:1.55; }
  .bub-a { background:#fff; border:1px solid var(--border-light); border-radius:12px 12px 12px 2px; color:var(--text); }
  .bub-u { background:var(--purple); color:#fff; border-radius:12px 12px 2px 12px; max-width:75%; }

  .card-c {
    background:#fff; border:1px solid var(--border-light); border-radius:var(--r-2xl);
    padding:14px; margin:2px 0; max-width:94%; box-shadow:var(--shadow-card);
    animation:fadeUp 0.3s ease-out;
  }

  /* Input bar */
  .input-bar {
    position:absolute; bottom:48px; left:0; right:0; background:#fff;
    border-top:1px solid var(--border); padding:8px 12px; z-index:20;
    display:flex; align-items:center; gap:8px;
  }
  .input-bar .voice-btn {
    width:36px; height:36px; border-radius:50%; border:1px solid var(--border-light);
    background:#fff; font-size:18px; cursor:pointer; display:flex; align-items:center; justify-content:center;
    flex-shrink:0; transition:all 0.15s;
  }
  .input-bar .voice-btn:active { background:var(--purple-light); border-color:var(--purple); }
  .input-bar .voice-btn.recording { background:var(--danger); color:#fff; border-color:var(--danger); animation:pulse 1.5s infinite; }
  .input-bar input {
    flex:1; border:1px solid var(--border-light); border-radius:var(--r-full);
    padding:9px 16px; font-size:13px; font-family:var(--font-ui); outline:none;
    background:var(--bg); color:var(--text); transition:border-color 0.15s;
  }
  .input-bar input:focus { border-color:var(--purple); }
  .input-bar input::placeholder { color:var(--text-muted); }
  .input-bar .send-btn {
    width:36px; height:36px; border-radius:50%; border:none;
    background:var(--purple); color:#fff; font-size:16px; cursor:pointer;
    display:flex; align-items:center; justify-content:center; flex-shrink:0;
    transition:all 0.15s;
  }
  .input-bar .send-btn:active { background:var(--purple-dark); }

  /* Quickbar — compact, below input */
  .qb {
    position:absolute; bottom:0; left:0; right:0; background:#fff;
    border-top:1px solid var(--border-light);
    display:flex; justify-content:space-around; padding:4px 8px 16px; z-index:20;
  }
  .qb button {
    display:flex; flex-direction:column; align-items:center; gap:1px;
    border:none; background:none; color:var(--text-muted); font-size:8px; cursor:pointer;
  }
  .qb button:active { color:var(--purple); }
  .qb .qi { font-size:14px; }

  @keyframes fadeUp { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }

  /* Scenario bar */
  .scenario-bar {
    display:flex; align-items:center; gap:8px; padding:6px 14px;
    background:var(--purple-light); border-bottom:1px solid var(--purple-subtle);
    font-size:11px; flex-shrink:0;
  }
  .scenario-bar a { color:var(--purple); text-decoration:none; font-weight:600; }
  .scenario-bar .sc-tag { background:var(--purple);color:#fff;padding:2px 8px;border-radius:var(--r-full);font-size:9px;font-weight:700; }
  .scenario-bar .sc-step { color:var(--text-muted);font-size:10px;margin-left:auto; }
</style>
</head>
<body>
<div class="sh">
  <header class="mh">
    <div class="av">🤖</div>
    <div class="info"><div class="name">销售智能体</div><div class="sub" id="stitle"></div></div>
    <button class="rt" id="rtoggle">切换角色</button>
  </header>
  <div class="scenario-bar" id="scenarioBar" style="display:none">
    <a href="scenarios.html">← 返回场景汇总</a>
    <span class="sc-tag" id="scTag"></span>
    <span class="sc-step" id="scStep"></span>
  </div>
  <main class="chat" id="chat"></main>
  <div class="input-bar">
    <button class="voice-btn" id="voiceBtn" title="语音输入">🎤</button>
    <input type="text" id="msgInput" placeholder="输入消息或点击麦克风语音输入..." autocomplete="off">
    <button class="send-btn" id="sendBtn">↑</button>
  </div>
  <footer class="qb">
    <button data-a="dashboard"><span class="qi">📊</span>看板</button>
    <button data-a="map"><span class="qi">🗺️</span>地图</button>
    <button data-a="visit"><span class="qi">📝</span>报拜访</button>
    <button data-a="bid"><span class="qi">📋</span>标讯</button>
    <button data-a="coach"><span class="qi">💬</span>问教练</button>
  </footer>
</div>

<script>
var NOW=new Date();
function dL(n){var d=new Date(NOW);d.setDate(d.getDate()+n);return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function fmK(n){return '¥'+(n/10).toFixed(0)+'万';}
function fmP(a,t){return Math.round(a/t*100)+'%';}
function fmV(v){return v+'%';}

var AR={name:'张三',role:'ar',region:'东南大区',territory:'浙江战区',industries:['企业级IT'],
  targets:{rev:{target:3500,achieved:1470,rank:'3/10'},ca:{target:2200,achieved:1210,rank:'3/10'},compA:{target:100,achieved:78,rank:'4/10'},compB:{target:100,achieved:82,rank:'3/10'}},
  strategicTasks:[{label:'高价值客户经营',done:2,total:6},{label:'海光战核客户经营',done:2,total:4},{label:'重点战役',done:1,total:3},{label:'客户拜访',done:10,total:20}],
  bids:{intended:[{name:'通用服务器框架采购',amount:1200,deadline:dL(5),highValue:true},{name:'分布式存储扩容项目',amount:900,deadline:dL(12),highValue:true},{name:'数据中心解决方案招标',amount:600,deadline:dL(20),highValue:false}],public:[{name:'私有云平台建设项目',amount:1500,deadline:dL(3),highValue:true,status:'pending'},{name:'AI算力集群采购',amount:800,deadline:dL(8),highValue:true,status:'pending'},{name:'政务云安全加固项目',amount:400,deadline:dL(15),highValue:false,status:'reported'}]},
  mapPins:[{type:'sales',name:'张三',rev:40,x:62,y:28},{type:'customer',name:'某云计算科技',status:'good',x:58,y:22},{type:'customer',name:'某大数据中心',status:'risk',x:45,y:62},{type:'bid',name:'私有云平台建设',highValue:true,x:70,y:45},{type:'competitor',name:'竞品H公司',x:40,y:18}]
};

var GM={name:'王指挥',role:'gm',region:'东南大区',territory:'浙江战区',industries:['企业级IT','制造'],
  targets:{rev:{target:18000,achieved:7560,rank:'2/8'},ca:{target:13000,achieved:7150,rank:'2/8'}},
  strategicTasks:[{label:'高价值客户经营',done:16,total:30},{label:'海光战核客户经营',done:14,total:24},{label:'重点战役',done:9,total:18},{label:'客户拜访',done:78,total:120}],
  bids:{intended:[{name:'通用服务器框架采购',amount:1200,deadline:dL(5),highValue:true},{name:'智能制造MES平台',amount:700,deadline:dL(10),highValue:true}],public:[{name:'私有云平台建设项目',amount:1500,deadline:dL(3),highValue:true,status:'pending'},{name:'AI算力集群采购',amount:800,deadline:dL(8),highValue:true,status:'pending'}]},
  mapPins:[{type:'sales',name:'张三',rev:40,x:55,y:20},{type:'sales',name:'王五',rev:28,x:48,y:62},{type:'customer',name:'某大数据中心',status:'risk',x:25,y:60},{type:'bid',name:'私有云平台',highValue:true,x:75,y:40}]
};
function gD(r){return r==='gm'?GM:AR;}

var role=(new URLSearchParams(window.location.search)).get('role')||'ar';
var data=gD(role);

function addMsg(t){var c=document.getElementById('chat');var d=document.createElement('div');d.className='msg msg-a';d.innerHTML='<div class="mav">🤖</div><div class="bub bub-a">'+t+'</div>';c.appendChild(d);c.scrollTop=c.scrollHeight;}
function addUser(t){var c=document.getElementById('chat');var d=document.createElement('div');d.className='msg msg-u';d.innerHTML='<div class="bub bub-u">'+t+'</div>';c.appendChild(d);c.scrollTop=c.scrollHeight;}
function addCard(h){var c=document.getElementById('chat');var d=document.createElement('div');d.className='card-c';d.innerHTML=h;c.appendChild(d);c.scrollTop=c.scrollHeight;}

function runGreeting(){
  setTimeout(function(){addMsg('早上好！☀️<br>你的今日作战概览已就绪。今日有 <b>3 个待拜访客户</b>，已为你准备好拜访导航。');},400);
  setTimeout(pushMetrics,1200);
  if(role==='ar'){
    setTimeout(function(){addMsg('你有 <b style="color:var(--danger)">2 个差距</b>需关注：REV 达成 40%，某云计算科技未覆盖、某大数据中心商机停滞。');},2000);
    setTimeout(pushGap,3000);
    setTimeout(function(){addMsg('建议今日重点拜访某云计算科技，预计可贡献 ¥32万。<br>需要我帮你生成今日拜访计划吗？');},4200);
    // Auto-play scenario
    if(scenario==='1'){ setTimeout(function(){ updateScStep('自动触发：生成今日拜访计划'); hAct('帮我生成拜访计划'); },5200); }
    if(scenario==='2'){ setTimeout(function(){ updateScStep('自动触发：标讯推送 → 创建商机 → 生成沟通资料'); },3000); setTimeout(function(){ hAct('查看最新标讯'); },3500); }
    if(scenario==='4'){ setTimeout(function(){ updateScStep('自动触发：教练建议 → 案例展示 → 模拟陪练'); hAct('看看教练建议'); },5200); }
  } else {
    setTimeout(function(){addMsg('⚠️ <b style="color:var(--danger)">王五、钱七</b>达成率持续落后，需要管理干预。');},2000);
    setTimeout(pushGap,3000);
    setTimeout(function(){addMsg('已为你列出管理建议：绩效面谈、过程抽检、新人带教。<br>需要我帮你安排吗？');},4200);
    if(scenario==='3'){ setTimeout(function(){ updateScStep('自动触发：安排管理动作'); hAct('帮我安排管理动作'); },5200); }
  }
}

function updateScStep(t){ var el=document.getElementById('scStep'); if(el) el.textContent='▶ '+t; }

function pushMetrics(){
  var t=data.targets;
  var items=role==='ar'?[
    {l:'Q2 REV',v:fmP(t.rev.achieved,t.rev.target),c:'var(--danger)',s:'排名 '+t.rev.rank},
    {l:'Q2 CA',v:fmP(t.ca.achieved,t.ca.target),c:'var(--success)',s:'排名 '+t.ca.rank},
    {l:'竞争力 A',v:fmV(t.compA.achieved),c:'',s:'排名 '+t.compA.rank},
    {l:'竞争力 B',v:fmV(t.compB.achieved),c:'',s:'排名 '+t.compB.rank}
  ]:[
    {l:'团队 REV',v:fmP(t.rev.achieved,t.rev.target),c:'var(--success)',s:'战区排名 '+t.rev.rank},
    {l:'团队 CA',v:fmP(t.ca.achieved,t.ca.target),c:'var(--success)',s:'战区排名 '+t.ca.rank}
  ];
  var h='<div style="font-family:var(--font-display);font-weight:700;font-size:13px;margin-bottom:8px">📊 经营目标全景</div><div style="display:grid;grid-template-columns:1fr 1fr;gap:6px">';
  items.forEach(function(i){h+='<div style="background:var(--bg);border-radius:var(--r-lg);padding:10px;text-align:center;border:1px solid var(--border-light)"><div style="font-size:9px;color:var(--text-muted)">'+i.l+'</div><div class="mono" style="font-size:18px;font-weight:700;'+(i.c?'color:'+i.c:'')+'">'+i.v+'</div><div style="font-size:9px;color:var(--text-muted)">'+i.s+'</div></div>';});
  h+='</div>'+(role==='gm'?'<div style="margin-top:6px;font-size:10px;color:var(--danger)">⚠ 王五、钱七需重点关注</div>':'')+'<div style="color:var(--purple);font-size:10px;margin-top:6px;cursor:pointer" onclick="showDashboard()">查看完整看板 →</div>';
  addCard(h);
}

function showDashboard(){
  addUser('展开作战看板');
  setTimeout(function(){
    // Target overview card
    var t=data.targets;
    var h='<div style="font-family:var(--font-display);font-weight:700;font-size:14px;margin-bottom:10px">📊 作战看板全览</div>';
    h+='<div style="font-size:11px;color:var(--text-muted);margin-bottom:8px">'+data.region+' · '+data.territory+'</div>';

    // Metrics
    h+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-bottom:10px">';
    if(role==='ar'){
      h+=mt('Q2 REV',fmP(t.rev.achieved,t.rev.target),'var(--danger)')+mt('Q2 CA',fmP(t.ca.achieved,t.ca.target),'var(--success)')+mt('竞争力A',fmV(t.compA.achieved),'')+mt('竞争力B',fmV(t.compB.achieved),'');
    }else{
      h+=mt('团队REV',fmP(t.rev.achieved,t.rev.target),'var(--success)')+mt('团队CA',fmP(t.ca.achieved,t.ca.target),'var(--success)');
    }
    h+='</div>';

    // Strategic tasks
    h+='<div style="font-weight:600;font-size:11px;margin-bottom:4px">🎯 战略任务达成</div>';
    data.strategicTasks.forEach(function(tk){
      var p=Math.round(tk.done/tk.total*100);
      var c=p>=60?'var(--success)':p>=40?'var(--warning)':'var(--danger)';
      h+='<div style="display:flex;justify-content:space-between;font-size:10px;margin-bottom:2px"><span>'+tk.label+'</span><span class="mono">'+tk.done+'/'+tk.total+'</span></div><div class="progress" style="margin-bottom:6px"><div class="trk '+(p>=60?'trk-s':p>=40?'trk-w':'trk-d')+'" style="width:'+p+'%"></div></div>';
    });

    // Gap
    h+='<div style="font-weight:600;font-size:11px;margin:8px 0 4px">🔍 关键差距</div>';
    h+=role==='ar'
      ?'<div style="font-size:10px;color:var(--text-secondary)">⚠ REV差¥12万 · 高价值客户缺口3家</div>'
      :'<div style="font-size:10px;color:var(--text-secondary)">⚠ 王五REV28% · 钱七拜访落后 · 赵六新人25%</div>';

    addCard(h);
  },400);
}
function mt(l,v,c){return '<div style="background:var(--bg);border-radius:6px;padding:8px;text-align:center;border:1px solid var(--border-light)"><div style="font-size:8px;color:var(--text-muted)">'+l+'</div><div class="mono" style="font-size:16px;font-weight:700;'+(c?'color:'+c:'')+'">'+v+'</div></div>';}

function pushGap(){
  if(role==='ar'){
    addCard('<div style="font-family:var(--font-display);font-weight:700;font-size:13px;margin-bottom:6px">🔍 差距 & 路径建议</div>'+
      '<div style="font-size:11px;color:var(--text-secondary);margin-bottom:4px">⚠ REV 差距 ¥19万 · 某云计算科技未覆盖 · 某大数据中心商机停滞</div>'+
      '<div style="font-size:11px;color:var(--purple);font-weight:600;margin-bottom:8px">→ 最优路径：某云计算科技 ¥32万 → 通用服务器标讯 ¥120万</div>'+
      '<button class="btn btn-p btn-xs" onclick="hAct(\'帮我生成拜访计划\')">📋 生成拜访计划</button> '+
      '<button class="btn btn-sub btn-xs" onclick="hAct(\'看看教练建议\')">🎓 教练建议</button>');
  } else {
    addCard('<div style="font-family:var(--font-display);font-weight:700;font-size:13px;margin-bottom:6px">🚨 团队差距 & 管理建议</div>'+
      '<div style="font-size:11px;color:var(--text-secondary);margin-bottom:4px">王五 REV 28% · 钱七 拜访落后 · 赵六 新人达成 25%</div>'+
      '<div style="font-size:11px;color:var(--purple);font-weight:600;margin-bottom:8px">→ 建议：绩效面谈（王五）· 过程抽检（钱七）· 带教（赵六）</div>'+
      '<button class="btn btn-p btn-xs" onclick="hAct(\'帮我安排管理动作\')">📅 安排管理动作</button> '+
      '<button class="btn btn-sub btn-xs" onclick="hAct(\'看看团队地图\')">🗺️ 查看团队地图</button>');
  }
}

function hAct(t){
  addUser(t);
  setTimeout(function(){
    if(t.indexOf('拜访计划')>=0){addMsg('收到。正在调用 <b>作战计划Agent</b>...');setTimeout(function(){addMsg('✅ 已生成今日拜访计划：<br><br>📅 <b>上午 10:00</b> 某云计算科技 — 服务器方案演示<br>📅 <b>下午 14:00</b> 某大数据中心 — 存储扩容沟通<br>📅 <b>本周四</b> 某互联网集团 — 解决方案高层交流<br><br>已同步到你的日程和行动提醒。');},1200);}
    else if(t.indexOf('教练')>=0){addMsg('🎓 <b>教练Agent</b> 诊断中...');setTimeout(function(){addMsg('你在<b>客户异议处理</b>方面存在提升空间。王五在类似场景下被评为优秀案例，建议先学习再模拟陪练。');},1200);setTimeout(function(){addCard('<div style="font-family:var(--font-display);font-weight:700;font-size:13px;margin-bottom:4px;color:var(--success)">🏆 优秀案例：客户异议处理</div><div style="font-size:11px;color:var(--text-secondary);margin-bottom:4px">王五在拜访某云计算科技时，成功化解客户对服务器方案的预算异议，最终签单 ¥32万。</div><div style="font-size:11px;margin-bottom:6px">核心方法：<b>先共情理解 → 数据化价值说服 → 提供替代方案</b></div><button class="btn btn-p btn-xs" onclick="hAct(\'开始模拟陪练\')">🎓 开始模拟陪练</button>');},2400);}
    else if(t.indexOf('陪练')>=0){addMsg('启动模拟陪练场景：客户预算异议处理...<br><br>🎯 目标：在客户提出预算不足时，引导转向价值讨论。<br>📝 3轮对话模拟已就绪，随时可以开始。');}
    else if(t.indexOf('管理动作')>=0){addMsg('收到。正在为你安排管理动作...');setTimeout(function(){addMsg('✅ 已添加 <b>王五绩效面谈</b> 到本周四 10:30<br>✅ 已标记 <b>钱七拜访记录</b> 待抽检<br>✅ 已通知 <b>孙八</b> 负责赵六新人带教');},1200);}

    else {addMsg('好的，我来帮你处理。「'+t+'」功能原型已展示核心交互流程。');}

// ═══ INPUT BAR ═══
var input=document.getElementById('msgInput');
var sendBtn=document.getElementById('sendBtn');
var voiceBtn=document.getElementById('voiceBtn');
var isRecording=false;

function sendMsg(){
  var t=input.value.trim(); if(!t) return;
  hAct(t); input.value='';
}
sendBtn.addEventListener('click',sendMsg);
input.addEventListener('keydown',function(e){if(e.key==='Enter') sendMsg();});

voiceBtn.addEventListener('click',function(){
  if(!isRecording){
    isRecording=true;
    voiceBtn.textContent='🔴';
    voiceBtn.classList.add('recording');
    addMsg('🎤 <b>正在聆听...</b>（原型模拟：2秒后自动识别）');
    setTimeout(function(){
      isRecording=false;
      voiceBtn.textContent='🎤';
      voiceBtn.classList.remove('recording');
      var phrases=['帮我看看今天的重点客户','最近的标讯有哪些','我的目标达成怎么样','给我一些行动建议'];
      var picked=phrases[Math.floor(Math.random()*phrases.length)];
      input.value=picked;
      addMsg('语音识别结果：<i>"'+picked+'"</i><br>点击发送按钮即可提问 →');
    },2000);
  }
});
