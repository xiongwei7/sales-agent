<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>作战导航 · PC 指挥舱</title>
<link rel="stylesheet" href="css/styles.css">
<style>
  /* ═══════ LAYOUT ═══════ */
  .shell { display:flex; flex-direction:column; height:100vh; background:var(--bg); }
  .topbar {
    display:flex; align-items:center; justify-content:center;
    padding:0 24px; background:#fff; border-bottom:1px solid var(--border);
    box-shadow:var(--shadow-sm); z-index:10; flex-shrink:0;
  }
  .topbar-inner {
    display:flex; align-items:center; justify-content:space-between;
    width:100%; max-width:1280px; padding:10px 0;
  }
  .topbar-l { display:flex; align-items:center; gap:12px; }
  .logo { font-family:var(--font-display); font-size:18px; font-weight:700; letter-spacing:-0.02em; }
  .logo em { color:var(--purple); font-style:normal; }
  .bcrumb { font-size:12px; color:var(--text-muted); padding:4px 12px; background:var(--bg); border-radius:var(--r-full); border:1px solid var(--border-light); }
  .topbar-c { display:flex; gap:4px; }
  .topbar-r { display:flex; align-items:center; gap:8px; }

  .nbtn {
    padding:7px 16px; border-radius:var(--r-xl); border:1px solid var(--border-light);
    background:#fff; color:var(--text-secondary); font-size:13px; font-weight:500;
    cursor:pointer; transition:all 0.15s;
  }
  .nbtn:hover { border-color:var(--purple); color:var(--purple); }
  .nbtn.on { background:var(--purple); color:#fff; border-color:var(--purple); }

  .uchip {
    display:flex; align-items:center; gap:6px; padding:5px 14px;
    border-radius:var(--r-full); background:var(--bg); border:1px solid var(--border-light);
    font-size:12px; color:var(--text-secondary);
  }

  .grid {
    display:grid; grid-template-columns:1fr 1fr 1fr 1fr; gap:12px;
    padding:16px 24px; flex:1; overflow-y:auto; align-content:start;
    max-width:1280px; margin:0 auto; width:100%;
  }
  .g-metrics { grid-column:1/-1; display:grid; grid-template-columns:repeat(auto-fit,minmax(165px,1fr)); gap:10px; }
  .g-tasks { grid-column:1/3; }
  .g-bids { grid-column:3/5; }
  .g-cust { grid-column:1/3; }
  .g-gap { grid-column:3/5; }
  .g-actions { grid-column:1/3; }
  .g-feed { grid-column:3/5; }

  .map-overlay { display:none; flex-direction:column; flex:1; overflow:hidden; background:var(--bg); }
  .map-body { display:flex; flex:1; overflow:hidden; }
  .map-left { flex:3; display:flex; flex-direction:column; overflow:hidden; position:relative; background:#fafbfc; }
  .map-right { flex:2; overflow-y:auto; padding:12px; display:flex; flex-direction:column; gap:8px; background:#fff; border-left:1px solid var(--border); max-width:380px; }
  .map-right .rp-card { background:#fff; border:1px solid var(--border-light); border-radius:var(--r-xl); padding:12px; box-shadow:var(--shadow-sm); }
  .map-right .rp-title { font-family:var(--font-display); font-size:12px; font-weight:700; margin-bottom:8px; }
  .map-right .rp-row { display:flex; justify-content:space-between; align-items:center; padding:4px 0; font-size:11px; border-bottom:1px solid var(--border-light); }
  .map-right .rp-row:last-child { border-bottom:none; }
  .map-right .rp-chips { display:flex; gap:4px; flex-wrap:wrap; margin-top:4px; }
  .map-right .rp-chip { padding:3px 8px; border-radius:var(--r-full); font-size:10px; font-weight:600; cursor:pointer; border:1px solid var(--border-light); background:#fff; color:var(--text-secondary); transition:all 0.15s; }
  .map-right .rp-chip.on { color:#fff; }
  .rp-chip.sales { border-color:#7132f5; color:#7132f5; } .rp-chip.sales.on { background:#7132f5; color:#fff; }
  .rp-chip.customer { border-color:#149e61; color:#149e61; } .rp-chip.customer.on { background:#149e61; color:#fff; }
  .rp-chip.bid { border-color:#f5a623; color:#f5a623; } .rp-chip.bid.on { background:#f5a623; color:#fff; }
  .rp-chip.competitor { border-color:#e54545; color:#e54545; } .rp-chip.competitor.on { background:#e54545; color:#fff; }
  .rp-chip.partner { border-color:#5b9cf5; color:#5b9cf5; } .rp-chip.partner.on { background:#5b9cf5; color:#fff; }

  @media (max-width:960px) {
    .grid { grid-template-columns:1fr; padding:12px; }
    .g-cust,.g-bids,.g-tasks,.g-gap,.g-actions,.g-feed { grid-column:1/-1; }
    .g-metrics { grid-template-columns:repeat(2,1fr); }
    .topbar-c { display:none; }
  }

  /* ═══════ MAP ═══════ */
  .m-bc { display:flex; gap:6px; align-items:center; padding:12px 20px; font-size:13px; flex-shrink:0; background:#fff; border-bottom:1px solid var(--border); }
  .m-bc-item { padding:5px 14px; border-radius:var(--r-full); font-size:12px; }
  .m-bc-item.on { background:var(--purple); color:#fff; font-weight:600; }
  .m-bc-item.clk { color:var(--purple); cursor:pointer; font-weight:500; }
  .m-bc-item.clk:hover { background:var(--purple-light); }
  .m-canvas { flex:1; padding:0; overflow:hidden; display:flex; align-items:center; justify-content:center; background:#fafbfc; position:relative; }
  .m-canvas svg { width:100%; height:100%; }
  .m-region { cursor:pointer; transition:opacity 0.15s; }
  .m-region:hover { opacity:0.85; }
  .m-region-label { font-size:13px; font-weight:700; fill:var(--text); text-anchor:middle; pointer-events:none; }
  .m-region-sub { font-size:10px; fill:var(--text-muted); text-anchor:middle; pointer-events:none; }
  .m-city { fill:var(--text-muted); font-size:9px; text-anchor:middle; }
  .m-legend { display:flex; gap:18px; justify-content:center; padding:10px 20px; font-size:11px; color:var(--text-muted); flex-shrink:0; background:#fff; border-top:1px solid var(--border); }
  .m-summary { text-align:center; padding:10px; margin:12px 20px; font-size:12px; color:var(--text-secondary); background:#fff; border-radius:var(--r-xl); border:1px solid var(--border-light); flex-shrink:0; }
  .m-pin { color:#fff; padding:2px 7px; border-radius:4px; font-size:9px; font-weight:600; white-space:nowrap; cursor:pointer; z-index:2; position:absolute; transition:transform 0.2s; }
  .m-pin:hover { transform:scale(1.15); z-index:10; }
  .m-pin.sales { border-radius:50%; width:28px; height:28px; display:flex; align-items:center; justify-content:center; padding:0; }
  .m-pin-label { font-size:8px; fill:var(--text-secondary); text-anchor:middle; }

  /* Scenario bar */
  .scenario-bar {
    display:flex; align-items:center; gap:8px; padding:6px 20px;
    background:var(--purple-light); border-bottom:1px solid var(--purple-subtle);
    font-size:11px; flex-shrink:0;
  }
  .scenario-bar a { color:var(--purple); text-decoration:none; font-weight:600; }
  .scenario-bar .sc-tag { background:var(--purple);color:#fff;padding:2px 8px;border-radius:var(--r-full);font-size:9px;font-weight:700; }
  .scenario-bar .sc-step { color:var(--text-muted);font-size:10px;margin-left:auto; }
</style>
</head>

// ═══════ HELPERS ═══════
function h(tag,attrs,kids){
  var e=document.createElement(tag);
  if(attrs) Object.keys(attrs).forEach(function(k){
    if(k==='c') e.className=attrs[k];
    else if(k==='h') e.innerHTML=attrs[k];
    else if(k==='s') e.style.cssText=attrs[k];
    else if(k[0]==='o') e.addEventListener(k.slice(1),attrs[k]);
    else e.setAttribute(k,attrs[k]);
  });
  if(kids) kids.forEach(function(k){if(typeof k==='string') e.appendChild(document.createTextNode(k));else if(k) e.appendChild(k);});
  return e;
}

      '<div class="ml">'+m.l+'</div><div class="mv" style="color:'+(cc||'')+'">'+m.v+' <span style="font-size:13px">'+ic+'</span></div><div class="ms">'+m.s+'</div>'}));

function renderBids(){
  var c=document.getElementById('bids'); if(!c) return;

  data.bids.intended.forEach(function(b){b._t='intended'; all.push(b);});
  data.bids.public.forEach(function(b){b._t='public'; all.push(b);});
  all.sort(function(a,b){
    if(a.highValue&&!b.highValue) return -1;

    return new Date(a.deadline)-new Date(b.deadline);
  });

  all.forEach(function(b){
    var urgent=new Date(b.deadline)-new Date()<3*86400000;
    var typeTag=b._t==='intended'

      ? (b.status==='reported'?'<span class="badge badge-s">✅</span>':'<span class="badge badge-d">⚠</span>')

function renderMap(){
  var overlay=document.getElementById('moverlay'); if(!overlay) return;
  overlay.innerHTML=''; overlay.style.display='flex';

  var levels=role==='gm'?[{k:'national',l:'🇨🇳 全国'}]:[];
  if(role==='gm'&&mapLevel!=='national'){
    levels.push({k:'region',l:'🏢 '+currentRegionKey+'大区'});
  }
  if(mapLevel==='territory'){
    levels.push({k:'territory',l:'📍 '+(currentTerritoryKey||data.territory)+'战区'});
  }
  if(role==='ar') levels=[{k:'territory',l:'📍 '+data.territory+'战区'}];

  var bc=h('div',{c:'m-bc'});
  levels.forEach(function(lv,i){
    var active=lv.k===mapLevel, clk=!active;
    bc.appendChild(h('span',{c:'m-bc-item'+(active?' on':'')+(clk?' clk':''),
      h:lv.l+(active?' <span style="font-size:9px;opacity:0.7">● 当前位置</span>':''),
      oclick:clk?function(){mapLevel=lv.k;if(lv.k==='national'){currentRegionKey=null;currentTerritoryKey=null;}renderMap();}:null}));
    if(i<levels.length-1) bc.appendChild(h('span',{h:' ▸ ',s:'color:var(--text-muted);margin:0 2px'}));
  });
  overlay.appendChild(bc);

  // Body with left/right split
  var body=h('div',{c:'map-body'});
  var left=h('div',{c:'map-left'});
  var right=h('div',{c:'map-right'});

  var canvas=h('div',{c:'m-canvas'});
  if(mapLevel==='national') renderNationalGeo(canvas);
  else if(mapLevel==='region') renderRegionGeo(canvas);
  else renderTerritoryGeo(canvas,right);
  left.appendChild(canvas);

  if(mapLevel==='territory'){
    var leg=h('div',{c:'m-legend'});
    Object.keys(PIN_COLORS).forEach(function(k){
      leg.appendChild(h('div',{s:'display:flex;align-items:center;gap:5px',h:
        '<span style="display:inline-block;width:10px;height:10px;background:'+PIN_COLORS[k].bg+';border-radius:'+(k==='sales'?'50%':'2px')+'"></span>'+PIN_COLORS[k].label}));
    });
    left.appendChild(leg);
    // Build right dashboard
    renderRightDashboard(right);
  } else if(mapLevel==='region'){
    renderRegionSummary(right);
  } else {
    renderNationalSummary(right);
  }

  body.appendChild(left); body.appendChild(right);
  overlay.appendChild(body);
}

  var revData={华东:48,华北:45,华南:44,东南:42,中东:40,东北:38,西南:35,西北:32};
  var tcData={华东:3,华北:5,华南:3,东南:3,中东:4,东北:2,西南:3,西北:3};
  right.appendChild(h('div',{c:'rp-card',h:
    '<div class="rp-title">🇨🇳 全国概览</div>'+
    '<div class="rp-row"><span>大区数</span><span class="mono">8 个</span></div>'+
    '<div class="rp-row"><span>战区数</span><span class="mono">26 个</span></div>'+
    '<div class="rp-row"><span>全国 REV 均值</span><span class="mono">42%</span></div>'
  }));
  // Region ranking
  right.appendChild(h('div',{c:'rp-card',h:
    '<div class="rp-title">🏆 大区 REV 排名</div>'+
    allRegions.map(function(k,i){
      var isMine=k===currentRegionKey;
      return '<div class="rp-row" onclick="drillRegion(\''+k+'\')" style="cursor:pointer;'+(isMine?'background:var(--purple-light);border-radius:4px;padding:4px 8px':'')+'"><span>'+(i+1)+'. '+k+(isMine?' ◀':'')+'</span><span class="mono">'+(revData[k]||40)+'%</span><span style="font-size:10px;color:var(--text-muted)">'+tcData[k]+'战区</span></div>';
    }).join('')
  }));
  right.appendChild(h('div',{s:'font-size:10px;color:var(--text-muted);padding:4px 8px',h:'点击大区可下钻查看详情'}));
}

function renderNationalGeo(canvas){
  if(!window.CHINA_REGIONS){ canvas.innerHTML='<div style="padding:40px;text-align:center;color:var(--text-muted)">地图数据加载中...</div>'; return; }
  var svg='<svg viewBox="73.5 3.4 61.6 50.2" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:100%">';
  svg+='<g transform="matrix(1 0 0 -1 0 57)">';
  svg+='<rect x="73.5" y="3.4" width="61.6" height="50.2" fill="#eef1f5"/>';
  // Layer 1: national base
  var allPaths=[];
  Object.values(CHINA_REGIONS).forEach(function(r){ r.paths.forEach(function(d){ allPaths.push(d); }); });
  allPaths.forEach(function(d){ svg+='<path d="'+d+'" fill="#f7f8fa" stroke="none"/>'; });
  // Layer 2: region-colored provinces
  var colors=['#eef3f8','#e6ecf4','#e2e9f2','#f2eef8','#f8eeee','#eef6f0','#fcf6ee','#e8f0f8'];
  var ci=0;
  Object.keys(CHINA_REGIONS).forEach(function(key){
    var r=CHINA_REGIONS[key];
    var isMine=key===currentRegionKey;
    var color=isMine?'#d8e8fb':colors[ci%colors.length];
    var sw=0.08;
    var stroke=isMine?'#5b9cf5':'#c8d0dc';
    r.paths.forEach(function(d){
      svg+='<path d="'+d+'" fill="'+color+'" stroke="'+stroke+'" stroke-width="'+sw+'" class="m-region" data-region="'+key+'"/>';
    });
    ci++;
  });
  svg+='</g>';
  // Labels (outside transform so they read normally)
  var labels={华北:'116,40',东北:'126,46',华东:'119,31',东南:'117,26',中东:'113,32',华南:'110,23',西南:'103,29',西北:'94,38'};
  Object.keys(labels).forEach(function(k){
    var p=labels[k].split(',');
    var isMine=k===currentRegionKey;
    svg+='<text x="'+p[0]+'" y="'+(57-parseFloat(p[1]))+'" font-size="0.8" font-weight="500" fill="'+(isMine?'#5b9cf5':'#777')+'" text-anchor="middle" pointer-events="none">'+k+(isMine?' ◀':'')+'</text>';
  });
  svg+='</svg>';
  canvas.innerHTML=svg;
  canvas.onclick=function(e){ var r=e.target.closest('[data-region]'); if(r){ drillRegion(r.getAttribute('data-region')); } };
}

function renderRegionGeo(canvas){
  if(!window.CHINA_REGIONS||!CHINA_REGIONS[currentRegionKey]){ canvas.innerHTML='<div style="padding:40px;text-align:center;color:var(--text-muted)">请先选择大区</div>'; return; }
  var rData=CHINA_REGIONS[currentRegionKey];
  var territories=rData.territories;
  // Compute bounding box
  var minX=Infinity,minY=Infinity,maxX=-Infinity,maxY=-Infinity;
  Object.values(territories).forEach(function(t){
    t.paths.forEach(function(d){
      var nums=(d.match(/[\d.]+/g)||[]).map(Number);
      for(var i=0;i<nums.length;i+=2){ if(nums[i]<minX)minX=nums[i];if(nums[i]>maxX)maxX=nums[i];if(nums[i+1]<minY)minY=nums[i+1];if(nums[i+1]>maxY)maxY=nums[i+1]; }
    });
  });
  var padX=(maxX-minX)*0.1,padY=(maxY-minY)*0.1;
  var vb=[minX-padX,minY-padY,maxX-minX+padX*2,maxY-minY+padY*2].join(' ');
  var colors=['#eaf2fa','#fceae8','#e8f5ea','#fef6e8','#f4eaf8','#eaf5f5'];
  var midY=minY+maxY;
  var svg='<svg viewBox="'+vb+'" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:100%">';
  svg+='<g transform="matrix(1 0 0 -1 0 '+midY+')">';
  svg+='<rect x="'+(minX-padX)+'" y="'+(minY-padY)+'" width="'+(maxX-minX+padX*2)+'" height="'+(maxY-minY+padY*2)+'" fill="#eef1f5"/>';
  Object.values(territories).forEach(function(t){ t.paths.forEach(function(d){ svg+='<path d="'+d+'" fill="#f7f8fa" stroke="none"/>'; }); });
  var ci=0;
  Object.keys(territories).forEach(function(key){
    var t=territories[key];
    var isMine=key===currentTerritoryKey;
    var color=isMine?'#d8e8fb':colors[ci%colors.length];
    var stroke=isMine?'#7132f5':'#d0d7e0';
    var sw=0.08;
    t.paths.forEach(function(d){
      svg+='<path d="'+d+'" fill="'+color+'" stroke="'+stroke+'" stroke-width="'+sw+'" class="m-region" data-territory="'+key+'"/>';
    });
    ci++;
  });
  svg+='</g>';
  Object.keys(territories).forEach(function(key){
    var t=territories[key];
    var d=t.paths[0];
    var nums=(d.match(/[\d.]+/g)||[]).map(Number);
    var cx=0,cy=0,cnt=0;
    for(var i=0;i<Math.min(nums.length,40);i+=2){cx+=nums[i];cy+=nums[i+1];cnt++;}
    cx/=cnt;cy/=cnt;
    var isMine=key===currentTerritoryKey;
    svg+='<text x="'+cx.toFixed(1)+'" y="'+(midY-cy).toFixed(1)+'" font-size="0.8" font-weight="500" fill="'+(isMine?'#7132f5':'#777')+'" text-anchor="middle" pointer-events="none">'+key+(isMine?' ◀':'')+'</text>';
  });
  svg+='</svg>';
  canvas.innerHTML=svg;
  // Event delegation
  canvas.onclick=function(e){ var t=e.target.closest('[data-territory]'); if(t){ drillTerritory(t.getAttribute('data-territory')); } };
}

function renderTerritoryGeo(canvas,right){
  canvas.style.position='relative'; canvas.style.overflow='hidden';
  var tKey=currentTerritoryKey||data.territory.replace('战区','');
  // Map territory name to CHINA_REGIONS key (strip 战区 suffix)
  var lookupKey=tKey.replace('战区','');
  var tData=null;
  Object.values(CHINA_REGIONS).forEach(function(r){
    if(r.territories&&r.territories[lookupKey]) tData=r.territories[lookupKey];
  });
  if(!tData||!tData.paths.length){
    canvas.innerHTML='<div style="padding:40px;text-align:center"><div style="font-size:28px;margin-bottom:6px">🗺️</div><div style="font-weight:700;font-size:13px;color:var(--purple)">'+tKey+'战区</div><div style="color:var(--text-muted);font-size:11px;margin-top:4px">省份矢量数据加载中...</div></div>';
    return;
  }
  // Compute viewBox
  var minX=Infinity,minY=Infinity,maxX=-Infinity,maxY=-Infinity;
  tData.paths.forEach(function(d){
    var nums=(d.match(/[\d.]+/g)||[]).map(Number);
    for(var i=0;i<nums.length;i+=2){
      if(nums[i]<minX)minX=nums[i];if(nums[i]>maxX)maxX=nums[i];
      if(nums[i+1]<minY)minY=nums[i+1];if(nums[i+1]>maxY)maxY=nums[i+1];
    }
  });
  var padX=(maxX-minX)*0.12,padY=(maxY-minY)*0.12;
  var midY=minY+maxY;
  var vb=[minX-padX,minY-padY,maxX-minX+padX*2,maxY-minY+padY*2].join(' ');
  var svg='<svg viewBox="'+vb+'" xmlns="http://www.w3.org/2000/svg" style="position:absolute;inset:0;width:100%;height:100%">';
  svg+='<g transform="matrix(1 0 0 -1 0 '+midY+')">';
  svg+='<rect x="'+(minX-padX)+'" y="'+(minY-padY)+'" width="'+(maxX-minX+padX*2)+'" height="'+(maxY-minY+padY*2)+'" fill="#eef1f5"/>';
  // Neighboring territories in same region (base layer)
  var region=CHINA_REGIONS[currentRegionKey];
  if(!region){ Object.values(CHINA_REGIONS).forEach(function(r){ if(r.territories&&r.territories[lookupKey]) region=r; }); }
  if(region){
    Object.values(region.territories).forEach(function(ot){
      ot.paths.forEach(function(d){ svg+='<path d="'+d+'" fill="#f7f8fa" stroke="none"/>'; });
    });
  }
  // Color layer: neighboring territories
  if(region){
    Object.keys(region.territories).forEach(function(k){
      if(k===lookupKey) return;
      var ot=region.territories[k];
      ot.paths.forEach(function(d){
        svg+='<path d="'+d+'" fill="#fafbfc" stroke="#e8ecf2" stroke-width="0.08"/>';
      });
    });
  }
  // Territory path (on top, highlighted)
  tData.paths.forEach(function(d){
    svg+='<path d="'+d+'" fill="#d8e8fb" stroke="#5b9cf5" stroke-width="0.08"/>';
  });
  svg+='</g>';
  svg+='</svg>';
  canvas.innerHTML=svg;

  // Data pins — filtered, positioned within map area (5%-90% range)
  var pins=(data.mapPins||[]).filter(function(p){ return mapFilter==='all'||mapFilter===p.type; });
  pins.forEach(function(p){
    // Clamp pin positions to 5-90% to stay within map
    var px=Math.max(8,Math.min(88,p.x));
    var py=Math.max(8,Math.min(88,p.y));
    var s=PIN_COLORS[p.type]||PIN_COLORS.customer;
    var isCircle=p.type==='sales';
    canvas.appendChild(h('div',{c:'m-pin'+(isCircle?' sales':''),
      s:'top:'+py+'%;left:'+px+'%;background:'+s.bg+';'+(isCircle?'':'box-shadow:0 2px 8px '+s.bg+'44'),
      h:isCircle?p.name.charAt(0):p.name,
      oclick:function(){alert('📍 '+p.name+(p.rev?'\nREV: '+p.rev+'%':'')+(p.status==='risk'?'\n⚠️ 风险客户':'')+(p.highValue?'\n⭐ 高价值标讯':''));}}));
  });
}

function drillRegion(key){ currentRegionKey=key; mapLevel='region'; renderMap(); }
function drillTerritory(key){ currentTerritoryKey=key; mapLevel='territory'; renderMap(); }

// ═══════ NAVIGATION ═══════
function updateUI(){
  var bc=role==='gm'?data.region+' · '+data.territory+'（管辖）':data.region+' · '+data.territory;
  document.getElementById('bc').textContent=bc;
  document.getElementById('uname').textContent=data.name;
}

function bindNav(){
  document.querySelectorAll('.rbtn').forEach(function(b){
    b.addEventListener('click',function(){
      role=this.dataset.r; data=gD(role); mapLevel=role==='gm'?'national':'territory';
      document.querySelectorAll('.rbtn').forEach(function(x){x.classList.toggle('on',x.dataset.r===role);});
      updateUI(); if(view==='dashboard') renderAll(); else renderMap();
    });
  });
  document.querySelectorAll('.vbtn').forEach(function(b){
    b.addEventListener('click',function(){
      view=this.dataset.v;
      document.querySelectorAll('.vbtn').forEach(function(x){x.classList.toggle('on',x.dataset.v===view);});
      if(view==='dashboard'){
        document.getElementById('moverlay').style.display='none';
        document.getElementById('grid').style.display='grid';
      } else {
        document.getElementById('grid').style.display='none';
        renderMap();
      }
    });
  });
}

// ═══ SCENARIO ═══
var scenario=(new URLSearchParams(window.location.search)).get('scenario')||'';
if(scenario==='3'){
  role='gm'; data=gD(role); mapLevel='national';
  document.getElementById('scenarioBar').style.display='flex';
  document.getElementById('scTag').textContent='场景三：战区总经理管理干预';
}
if(scenario){
  document.querySelectorAll('.rbtn').forEach(function(b){b.classList.toggle('on',b.dataset.r===role);});
}

updateUI(); renderAll(); bindNav();
</script>
